name: .NET CI

on:
  push:
    paths:
      - "SipCoreDotnet/**"
  pull_request:
    paths:
      - "SipCoreDotnet/**"

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: "8.0.x"
      - name: Restore
        run: |
          dotnet restore "SipCoreDotnet/SipCoreDotnet.sln"
      - name: Build
        run: |
          dotnet build "SipCoreDotnet/SipCoreDotnet.sln" --no-restore --configuration Release
      - name: Test
        run: |
          dotnet test "SipCoreDotnet/SipCoreDotnet.sln" --no-build --verbosity normal
